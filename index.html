<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="消消乐求解">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<title>数字消消乐 · 离线自动求解</title>
<style>
  :root {
    --bg: #f4f5f3;
    --card: #ffffff;
    --accent: #1d9e75;
    --accent-dark: #0f6e56;
    --text: #22221f;
    --muted: #6f6f68;
    --border: #e2e0d6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: 40px;
  }
  header { padding: 20px 20px 12px; text-align: center; }
  header h1 { font-size: 20px; margin: 0 0 4px; font-weight: 600; }
  header p { font-size: 13px; color: var(--muted); margin: 0; }
  .container { max-width: 480px; margin: 0 auto; padding: 0 16px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-top: 16px;
  }
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 24px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
  .btn-row { display: flex; gap: 10px; margin-top: 14px; }
  .btn {
    flex: 1;
    padding: 14px 10px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:active { background: var(--accent-dark); }
  .btn-secondary { background: #eef0ec; color: var(--text); }
  .btn:disabled { opacity: 0.5; }
  input[type="file"] { display: none; }
  #preview-wrap { margin-top: 14px; text-align: center; display: none; }
  #preview-wrap img { max-width: 100%; border-radius: 12px; border: 1px solid var(--border); }
  .status { margin-top: 14px; font-size: 13px; color: var(--muted); text-align: center; min-height: 18px; }
  .spinner {
    width: 22px; height: 22px;
    border: 3px solid #d8d8d0;
    border-top-color: var(--accent);
    border-radius: 50%;
    display: inline-block;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-bar {
    height: 8px;
    background: #eef0ec;
    border-radius: 4px;
    overflow: hidden;
    margin-top: 10px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.2s;
  }
  .summary { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .summary b { color: var(--text); font-weight: 600; }
  .round-card { margin-top: 14px; }
  .round-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .round-title .tag { font-size: 11px; font-weight: 500; background: #eaf3de; color: #3b6d11; padding: 3px 9px; border-radius: 999px; }
  .round-card canvas, .round-card img { width: 100%; border-radius: 12px; border: 1px solid var(--border); display: block; }
  .error-box { background: #fcebeb; color: #791f1f; border: 1px solid #f09595; border-radius: 10px; padding: 12px 14px; font-size: 13px; margin-top: 14px; }
  .error-box .error-title { font-weight: 600; margin-bottom: 6px; }
  .error-box .error-detail { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; white-space: pre-wrap; word-break: break-all; background: rgba(121,31,31,0.06); border-radius: 6px; padding: 8px; margin-top: 8px; max-height: 160px; overflow-y: auto; }
  .error-box .error-actions { margin-top: 10px; display: flex; gap: 8px; }
  .error-box .error-btn { font-size: 12px; padding: 6px 10px; border-radius: 8px; border: 1px solid #f09595; background: #fff; color: #791f1f; cursor: pointer; }
  .warn-box { background: #faeeda; color: #633806; border: 1px solid #ef9f27; border-radius: 10px; padding: 10px 14px; font-size: 12px; margin-top: 10px; }
  .offline-badge {
    display: inline-block;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;
    margin-top: 8px;
  }
  .offline-badge.ready { background: #eaf3de; color: #3b6d11; }
  .offline-badge.loading { background: #faeeda; color: #633806; }
  footer { text-align: center; font-size: 12px; color: var(--muted); margin-top: 30px; padding: 0 20px; }
</style>
</head>
<body>
<header>
  <h1>数字消消乐 · 离线自动求解</h1>
  <p>全部计算在本机浏览器内完成，无需网络、无需服务器</p>
  <div id="offline-badge" class="offline-badge loading">正在准备离线资源...</div>
</header>

<div class="container">
  <div class="card" id="engine-loading-card">
    <div class="summary"><span id="engine-loading-text">正在下载识别引擎（约9MB，仅首次需要）...</span></div>
    <div class="progress-bar" id="engine-progress-bar"><div class="progress-bar-fill" id="engine-progress-fill"></div></div>
    <div class="status" id="engine-loading-hint" style="margin-top:8px;">下载完成后可离线使用，请保持页面打开</div>
  </div>

  <div class="card" id="upload-card" style="display:none;">
    <div id="upload-zone" class="upload-zone">点击下方按钮拍照或从相册选择游戏截图</div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-camera" disabled>拍照</button>
      <button class="btn btn-secondary" id="btn-gallery" disabled>从相册选择</button>
    </div>
    <input type="file" id="file-camera" accept="image/*" capture="environment">
    <input type="file" id="file-gallery" accept="image/*">
    <div id="preview-wrap"><img id="preview-img" alt="预览"></div>
    <div class="status" id="status"></div>
    <div class="progress-bar" id="progress-bar" style="display:none;"><div class="progress-bar-fill" id="progress-fill"></div></div>
  </div>

  <div id="results"></div>
</div>

<footer>
  规则：任意大小矩形内数字和为 10 即可消除；已消除格按 0 计入后续求和；同一轮内矩形不重叠；逐轮消除直到无法再消除为止。
</footer>

<script src="vendor/tesseract.min.js"></script>
<script src="js/grid-detect.js"></script>
<script src="js/ocr.js"></script>
<script src="js/solver.js"></script>
<script src="js/renderer.js"></script>
<script>
const btnCamera = document.getElementById('btn-camera');
const btnGallery = document.getElementById('btn-gallery');
const fileCamera = document.getElementById('file-camera');
const fileGallery = document.getElementById('file-gallery');
const previewWrap = document.getElementById('preview-wrap');
const previewImg = document.getElementById('preview-img');
const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');
const progressBar = document.getElementById('progress-bar');
const progressFill = document.getElementById('progress-fill');
const offlineBadge = document.getElementById('offline-badge');
const engineLoadingCard = document.getElementById('engine-loading-card');
const engineLoadingText = document.getElementById('engine-loading-text');
const engineProgressFill = document.getElementById('engine-progress-fill');
const engineLoadingHint = document.getElementById('engine-loading-hint');
const uploadCard = document.getElementById('upload-card');

btnCamera.addEventListener('click', () => fileCamera.click());
btnGallery.addEventListener('click', () => fileGallery.click());
fileCamera.addEventListener('change', (e) => handleFile(e.target.files[0]));
fileGallery.addEventListener('change', (e) => handleFile(e.target.files[0]));

function setButtonsEnabled(enabled) {
  btnCamera.disabled = !enabled;
  btnGallery.disabled = !enabled;
}

const STAGE_LABELS = {
  'loading tesseract core': '下载识别引擎核心',
  'initializing tesseract': '初始化识别引擎',
  'loading language traineddata': '下载语言数据',
  'initializing api': '初始化接口',
  'recognizing text': '识别文字',
};

function onEngineProgress(m) {
  if (!m || typeof m.progress !== 'number') return;
  const pct = Math.round(m.progress * 100);
  const label = STAGE_LABELS[m.status] || m.status || '加载中';
  engineLoadingText.textContent = `正在${label}（${pct}%）...`;
  engineProgressFill.style.width = pct + '%';
}

let currentStage = '初始化';

function buildDiagnostics(err) {
  const lines = [];
  lines.push('阶段：' + currentStage);
  lines.push('错误信息：' + (err && err.message ? err.message : String(err)));
  if (err && err.cell) {
    lines.push('出错格子：第 ' + (err.cell.row + 1) + ' 行第 ' + (err.cell.col + 1) + ' 列');
  }
  const lastStatus = (window.Num10OCR && window.Num10OCR.getLastLoggerStatus) ? window.Num10OCR.getLastLoggerStatus() : null;
  if (lastStatus) {
    lines.push('OCR引擎最后状态：' + JSON.stringify(lastStatus));
  }
  const chosenSource = (window.Num10OCR && window.Num10OCR.getChosenSource) ? window.Num10OCR.getChosenSource() : null;
  lines.push('引擎文件来源：' + (chosenSource || '尚未确定'));
  lines.push('浏览器：' + navigator.userAgent);
  lines.push('页面地址：' + location.href);
  lines.push('时间：' + new Date().toString());
  if (err && err.cause && err.cause.stack) {
    lines.push('内部堆栈：' + String(err.cause.stack).slice(0, 800));
  } else if (err && err.stack) {
    lines.push('堆栈：' + String(err.stack).slice(0, 800));
  }
  return lines.join('\n');
}

function showError(err) {
  console.error(err);
  statusEl.textContent = '';
  progressBar.style.display = 'none';
  const detail = buildDiagnostics(err);
  const box = document.createElement('div');
  box.className = 'error-box';
  box.innerHTML = `
    <div class="error-title">处理失败（当前阶段：${currentStage}）</div>
    <div>${(err && err.message ? err.message : String(err))}</div>
    <div class="error-detail">${detail.replace(/</g, '&lt;')}</div>
    <div class="error-actions">
      <button class="error-btn" id="copy-diag-btn">复制诊断信息</button>
      <button class="error-btn" id="retry-btn">重试</button>
    </div>
  `;
  resultsEl.innerHTML = '';
  resultsEl.appendChild(box);
  document.getElementById('copy-diag-btn').addEventListener('click', () => {
    const btn = document.getElementById('copy-diag-btn');
    const text = box.querySelector('.error-title').textContent + '\n' + detail;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => { btn.textContent = '已复制'; setTimeout(() => { btn.textContent = '复制诊断信息'; }, 1500); });
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = '已复制';
      setTimeout(() => { btn.textContent = '复制诊断信息'; }, 1500);
    }
  });
  document.getElementById('retry-btn').addEventListener('click', () => {
    if (previewImg.src) {
      const img = new Image();
      img.onload = () => runPipeline(img);
      img.src = previewImg.src;
    }
  });
}

window.addEventListener('error', (e) => {
  if (e && e.message) showError({ message: '页面运行时错误：' + e.message, stack: e.error && e.error.stack });
});
window.addEventListener('unhandledrejection', (e) => {
  const reason = e.reason;
  showError({ message: '未捕获的异步错误：' + (reason && reason.message ? reason.message : String(reason)), stack: reason && reason.stack });
});

async function warmUpOCR() {
  currentStage = 'OCR引擎初始化';
  try {
    await withTimeout(Num10OCR.getWorker(onEngineProgress), 90000, 'OCR引擎初始化');
    const src = Num10OCR.getChosenSource ? Num10OCR.getChosenSource() : null;
    const srcLabel = src === 'jsdelivr-mirror' ? '(镜像线路)' : (src === 'github-direct' ? '(直连线路)' : '');
    offlineBadge.textContent = '离线资源已就绪，可断网使用 ' + srcLabel;
    offlineBadge.className = 'offline-badge ready';
    engineLoadingCard.style.display = 'none';
    uploadCard.style.display = 'block';
    setButtonsEnabled(true);
  } catch (err) {
    offlineBadge.textContent = '离线资源加载失败，点击查看详情';
    offlineBadge.className = 'offline-badge loading';
    offlineBadge.style.cursor = 'pointer';
    offlineBadge.onclick = () => showError(err);
    engineLoadingText.textContent = '识别引擎加载失败';
    engineLoadingHint.innerHTML = '点击下方按钮重试，或查看 <a href="#" id="engine-error-link">详细原因</a>';
    const retryEngineBtn = document.createElement('button');
    retryEngineBtn.className = 'btn btn-primary';
    retryEngineBtn.textContent = '重新加载';
    retryEngineBtn.style.marginTop = '10px';
    retryEngineBtn.style.width = '100%';
    retryEngineBtn.addEventListener('click', () => location.reload());
    engineLoadingCard.appendChild(retryEngineBtn);
    const link = document.getElementById('engine-error-link');
    if (link) link.addEventListener('click', (e) => { e.preventDefault(); showError(err); });
  }
}
warmUpOCR();

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    previewImg.src = ev.target.result;
    previewWrap.style.display = 'block';
    const img = new Image();
    img.onload = () => runPipeline(img);
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

async function withTimeout(promise, ms, label) {
  let timer;
  const timeoutPromise = new Promise((_, reject) => {
    timer = setTimeout(() => reject(new Error(`${label}超时（超过${Math.round(ms / 1000)}秒未响应，可能是浏览器兼容性问题，建议尝试更换浏览器或重新加载页面）`)), ms);
  });
  try {
    return await Promise.race([promise, timeoutPromise]);
  } finally {
    clearTimeout(timer);
  }
}

async function runPipeline(imgEl) {
  resultsEl.innerHTML = '';
  setButtonsEnabled(false);
  progressBar.style.display = 'none';
  currentStage = '检测棋盘网格';
  statusEl.innerHTML = '<span class="spinner"></span>正在检测棋盘网格...';

  try {
    const canvas = Num10GridDetect.loadImageToCanvas(imgEl);
    const detection = Num10GridDetect.detectGrid(canvas);

    progressBar.style.display = 'block';
    progressFill.style.width = '0%';
    currentStage = '识别数字';
    statusEl.innerHTML = '<span class="spinner"></span>正在识别数字 (0%)...';

    const { grid, confidence } = await withTimeout(
      Num10OCR.ocrGrid(canvas, detection, (done, total) => {
        const pct = Math.round((done / total) * 100);
        progressFill.style.width = pct + '%';
        statusEl.innerHTML = `<span class="spinner"></span>正在识别数字 (${pct}%)...`;
      }),
      60000,
      '数字识别'
    );

    currentStage = '求解消除';
    statusEl.innerHTML = '<span class="spinner"></span>正在求解消除...';
    const { rounds, finalBoard } = Num10Solver.solve(grid);

    currentStage = '渲染结果图片';
    statusEl.innerHTML = '<span class="spinner"></span>正在渲染结果图片...';
    const images = Num10Renderer.renderAllRounds(canvas, detection, rounds);

    let lowConfCount = 0;
    for (let r = 0; r < detection.rows; r++) {
      for (let c = 0; c < detection.cols; c++) {
        if (!confidence[r][c]) lowConfCount++;
      }
    }

    window.__lastResult = { grid, confidence, rows: detection.rows, cols: detection.cols, rounds: rounds.map(r => ({ round: r.round, rects: r.rects })), finalBoard };
    renderResults({ detection, rounds, images, lowConfCount });
  } catch (err) {
    showError(err);
  } finally {
    setButtonsEnabled(true);
  }
}

function renderResults({ detection, rounds, images, lowConfCount }) {
  statusEl.textContent = '';
  progressBar.style.display = 'none';

  let html = '';
  html += `<div class="card">
    <div class="summary"><span>识别网格</span><b>${detection.rows} 行 × ${detection.cols} 列</b></div>
    <div class="summary"><span>可消除轮数</span><b>${rounds.length} 轮</b></div>
  </div>`;

  if (lowConfCount > 0) {
    html += `<div class="warn-box">有 ${lowConfCount} 个数字识别置信度较低，建议拍摄更清晰、光线均匀的照片以提高准确率。</div>`;
  }

  if (rounds.length === 0) {
    html += `<div class="card">当前棋盘没有可消除的矩形。</div>`;
  }

  resultsEl.innerHTML = html;

  images.forEach((img) => {
    const card = document.createElement('div');
    card.className = 'card round-card';
    const title = document.createElement('div');
    title.className = 'round-title';
    if (img.round != null) {
      title.innerHTML = `第 ${img.round} 轮 <span class="tag">消除 ${img.rects.length} 组</span>`;
    } else {
      title.innerHTML = `最终结果 <span class="tag">无法再消除</span>`;
    }
    card.appendChild(title);
    card.appendChild(img.canvas);
    resultsEl.appendChild(card);
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch((err) => console.warn('SW register failed', err));
  });
}
</script>
</body>
</html>
